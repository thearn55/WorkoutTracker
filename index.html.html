function emptyData(){return{sessions:[],logs:{},profile:clone(DEFAULT_PROFILE),plan:clone(DEFAULT_PLAN)}}

 const startSession=day=>{const log={},done={};data.plan[day].exercises.forEach(ex=>{const rec=recommendation(ex),last=getLast(ex.id);log[ex.id]=Array.from({length:ex.sets},(_,i)=>({weight:rec.weight||last?.sets?.[i]?.weight||last?.weight||"",reps:last?.sets?.[i]?.reps||"",rir:last?.sets?.[i]?.rir??"",exerciseName:ex.name}));done[ex.id]=Array(ex.sets).fill(false)});setSessionLog(log);setCompleted(done);setActiveDay(day);setStartedAt(Date.now());setNotes("");setView("session")};

 const addExercise=day=>setData(p=>{const plan=clone(p.plan),id=uid();plan[day].exercises.push({id,name:"New Exercise",type:"hypertrophy",sets:3,minReps:8,maxReps:12,increment:5,alternatives:[]});return{...p,plan}});

 return <div style={{minHeight:"100vh"}}>
  <header style={{background:"#111",borderBottom:"1px solid #1e1e1e",padding:"15px 16px",position:"sticky",top:0,zIndex:100}}><div style={{maxWidth:520,margin:"auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:21,color:"#e8ff47",letterSpacing:2}}>POWERBUILDING</div><div className="small muted" style={{fontSize:10,letterSpacing:1}}>ISRAEL'S TRAINING SYSTEM</div></div>{view==="session"?<button className="btn ghost" onClick={()=>setView("home")}>← BACK</button>:<nav style={{display:"flex",gap:13}}>{[["home","⌂"],["history","◷"],["progress","↗"],["program","≡"],["settings","⚙"]].map(([v,icon])=><button key={v} className={`nav-btn ${view===v?"active":""}`} onClick={()=>setView(v)} style={{background:"none",border:0,color:view===v?"#fff":"#555",paddingBottom:4,cursor:"pointer",fontSize:13}}>{icon}<span className="nav-label" style={{marginLeft:4}}>{v.toUpperCase()}</span></button>)}</nav>}</div></header>
  <main style={{maxWidth:520,margin:"auto",padding:"20px 16px 50px"}}>

dding:"9px 10px",marginTop:10}}><div className="small" style={{fontSize:9,color:"#e8ff47",letterSpacing:1}}>{rec.label}</div><div className="small" style={{fontSize:11,color:"#8a8a8a",marginTop:3}}>{rec.text}</div></div><div style={{display:"flex",gap:7,marginTop:9}}>{ex.type==="strength"&&<button className="btn ghost small" style={{fontSize:10,padding:"7px 9px"}} onClick={()=>setExpandedWarmups(p=>({...p,[ex.id]:!p[ex.id]}))}>WARM-UPS {expandedWarmups[ex.id]?"▲":"▼"}</button>}{ex.alternatives.length>0&&<button className="btn ghost small" style={{fontSize:10,padding:"7px 9px"}} onClick={()=>swapExercise(ex)}>SWAP EXERCISE</button>}</div>{expandedWarmups[ex.id]&&<div className="small" style={{marginTop:9,color:"#777",fontSize:11}}>{wu.length?wu.map((x,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 2px",borderBottom:"1px solid #1c1c1c"}}><span>Warm-up {i+1}</span><span>{x.weight} {data.profile.unit} × {x.reps}</span></div>):"Enter your working weight to generate warm-ups."}</div>}</div><div style={{padding:"10px 14px 13px"}}><div className="set-grid small" style={{fontSize:9,color:"#444",letterSpacing:1,marginBottom:5}}><div/><div>WEIGHT</div><div>REPS</div><div>RIR</div><div/></div>{Array.from({length:ex.sets}).map((_,i)=>{const s=sets[i]||{},checked=completed[ex.id]?.[i];return <div className="set-grid" key={i} style={{padding:"4px 0",opacity:checked?.65:1}}><div className="small muted" style={{fontSize:11,textAlign:"center"}}>{i+1}</div><input className="field" type="number" value={s.weight||""} onChange={e=>updateSet(ex.id,i,"weight",e.target.value)}/><input className="field" type="number" value={s.reps||""} onChange={e=>updateSet(ex.id,i,"reps",e.target.value)}/><select className="field" value={s.rir} onChange={e=>updateSet(ex.id,i,"rir",e.target.value)}><option value="">—</option>{[0,1,2,3,4,5].map(n=><option key={n}>{n}</option>)}</select><button className="check-btn" onClick={()=>toggle(ex,i)} style={{width:32,height:32,borderRadius:6,border:0,background:checked?"#e8ff47":"#1b1b1b",color:checked?"#000":"#444"}}>✓</button></div>})}</div></div>})}<Section title="SESSION NOTES"/><textarea className="field" style={{minHeight:86,resize:"vertical"}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Energy, technique, pain, wins..."/><button className="btn accent" onClick={finish} style={{width:"100%",padding:15,fontSize:19,letterSpacing:2,marginTop:12}}>FINISH SESSION</button></>}
   {view==="history"&&<><Section title="SESSION HISTORY"/>{!data.sessions.length&&<Empty text="No sessions logged yet."/>}{[...data.sessions].reverse().map(s=><div className="card" key={s.id||Math.random()} style={{padding:14,marginBottom:10,borderLeft:`3px solid ${data.plan[s.day]?.color||"#333"}`}}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:18,color:data.plan[s.day]?.color}}>{s.day}</div><div className="small" style={{fontSize:11,color:"#777"}}>{data.plan[s.day]?.label}</div></div><div className="small muted" style={{fontSize:11,textAlign:"right"}}>{s.date}<br/>{s.durationMinutes||"—"} min · {Math.round(s.totalVolume||0).toLocaleString()} vol</div></div>{s.notes&&<div className="small" style={{fontSize:11,color:"#666",marginTop:9,paddingTop:8,borderTop:"1px solid #1d1d1d"}}>{s.notes}</div>}</div>)}</>}
   {view==="progress"&&<><Section title="LIFT PROGRESSION"/>{!Object.values(data.logs).some(x=>x.length)&&<Empty text="Log workouts to unlock progression."/>}{allExercises.map(ex=>{const logs=getLogs(ex.id);if(!logs.length)return null;const max=Math.max(...logs.map(l=>Number(l.e1rm||e1rm(l.weight,l.reps)))),last=logs.slice(-1)[0],first=logs[0],pct=((Number(last.e1rm||e1rm(last.weight,last.reps))-Number(first.e1rm||e1rm(first.weight,first.reps)))/Number(first.e1rm||e1rm(first.weight,first.reps))*100).toFixed(1);return <div className="card" key={ex.id} style={{padding:14,marginBottom:11}}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:17}}>{ex.name}</div><div className="small muted" style={{fontSize:10}}>{logs.length} sessions</div></div><div className="small" style={{fontSize:11,color:Number(pct)>=0?"#e8ff47":"#ff6b47"}}>{Number(pct)>=0?"+":""}{pct}%</div></div><div style={{height:50,display:"flex",alignItems:"end",gap:4,margin:"12px 0 7px"}}>{logs.slice(-12).map((l,i,a)=><div key={i} style={{flex:1,height:`${Math.max(8,Number(l.e1rm||e1rm(l.weight,l.reps))/max*100)}%`,background:i===a.length-1?"#e8ff47":"#292929",borderRadius:3}}/>)}</div><div className="small muted" style={{display:"flex",justifyContent:"space-between",fontSize:10}}><span>Last: {last.weight} × {last.reps}</span><span>Best e1RM: {Math.round(max)}</span></div></div>})}</>}
   {view==="program"&&<><Section title="PROGRAM BUILDER"/><div className="small muted" style={{fontSize:11,marginBottom:12}}>Edit exercises, set counts, rep ranges, progression type, and substitutions. Changes save automatically.</div><div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:13}}>{Object.keys(data.plan).map(day=><button key={day} className={`btn ${editingDay===day?"accent":"ghost"}`} onClick={()=>setEditingDay(day)}>{day}</button>)}</div><div className="card" style={{padding:14,marginBottom:12}}><label className="small muted" style={{fontSize:10}}>WORKOUT NAME</label><input className="field" value={data.plan[editingDay].label} onChange={e=>setData(p=>({...p,plan:{...p.plan,[editingDay]:{...p.plan[editingDay],label:e.target.value}}}))}/></div>{data.plan[editingDay].exercises.map((ex,i)=><div className="card" key={ex.id} style={{padding:13,marginBottom:10}}><div className="program-grid"><input className="field" value={ex.name} onChange={e=>updateExercise(editingDay,ex.id,"name",e.target.value)}/><select className="field" value={ex.type} onChange={e=>updateExercise(editingDay,ex.id,"type",e.target.value)}><option value="strength">Strength</option><option value="hypertrophy">Hypertrophy</option></select><input className="field range" type="number" value={ex.sets} onChange={e=>updateExercise(editingDay,ex.id,"sets",e.target.value)} title="Sets"/></div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginTop:7}}><input className="field" type="number" value={ex.minReps} onChange={e=>updateExercise(editingDay,ex.id,"minReps",e.target.value)} placeholder="Min reps"/><input className="field" type="number" value={ex.maxReps} onChange={e=>updateExercise(editingDay,ex.id,"maxReps",e.target.value)} placeholder="Max reps"/><input className="field" type="number" value={ex.increment} onChange={e=>updateExercise(editingDay,ex.id,"increment",e.target.value)} placeholder="Increment"/></div><label className="small muted" style={{display:"block",fontSize:9,marginTop:8}}>SUBSTITUTIONS (comma separated)</label><input className="field" value={ex.alternatives.join(", ")} onChange={e=>updateExercise(editingDay,ex.id,"alternatives",e.target.value.split(",").map(x=>x.trim()).filter(Boolean))}/><div style={{display:"flex",justifyContent:"space-between",marginTop:8}}><div style={{display:"flex",gap:6}}><button className="btn ghost" onClick={()=>moveExercise(editingDay,i,-1)}>↑</button><button className="btn ghost" onClick={()=>moveExercise(editingDay,i,1)}>↓</button></div><button className="btn danger" onClick={()=>removeExercise(editingDay,ex.id)}>REMOVE</button></div></div>)}<button className="btn accent" style={{width:"100%",marginBottom:9}} onClick={()=>addExercise(editingDay)}>+ ADD EXERCISE</button><button className="btn ghost" style={{width:"100%"}} onClick={resetPlan}>RESET TO ATTACHED PLAN</button></>}
   {view==="settings"&&<><Section title="PERSONALIZATION"/><div className="card" style={{padding:15}}>{[["NAME","name","text"],["BODYWEIGHT","bodyweight","number"],["HYPERTROPHY REST (SECONDS)","defaultRestSeconds","number"],["STRENGTH REST (SECONDS)","strengthRestSeconds","number"]].map(([label,key,type])=><label className="small" key={key} style={{display:"block",fontSize:10,color:"#666",marginBottom:11}}>{label}<input className="field" type={type} value={data.profile[key]} onChange={e=>updateProfile(key,type==="number"?Number(e.target.value):e.target.value)} style={{marginTop:5}}/></label>)}</div><Section title="STRENGTH GOALS" marginTop={22}/>{KEY_LIFTS.map(id=>{const b=getBest(id),current=b?Math.round(b.e1rm||e1rm(b.weight,b.reps)):0,goal=Number(data.profile.goals[id])||0,pct=goal?Math.min(100,current/goal*100):0;return <div className="card" key={id} style={{padding:14,marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:17}}>{KEY_NAMES[id]}</div><input className="field" style={{width:90}} type="number" value={data.profile.goals[id]} onChange={e=>setData(p=>({...p,profile:{...p.profile,goals:{...p.profile.goals,[id]:Number(e.target.value)}}}))}/></div><div className="progress-track" style={{marginTop:10}}><div style={{height:"100%",width:`${pct}%`,background:"#e8ff47"}}/></div><div className="small muted" style={{fontSize:9,display:"flex",justifyContent:"space-between",marginTop:5}}><span>Current e1RM: {current||"—"}</span><span>{Math.round(pct)}%</span></div></div>})}</>}
  </main>
 </div>
}
function Section({title,marginTop=0}){return <div className="small muted" style={{fontSize:10,letterSpacing:2,marginTop,marginBottom:11}}>{title}</div>}
function Empty({text}){return <div className="small muted" style={{textAlign:"center",padding:"55px 10px",fontSize:12}}>{text}</div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
